<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Battles</title>

<style>
body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #1a1a2e;
    color: white;
    font-family: sans-serif;
    margin: 0;
}

/* HUD */
.hud {
    width: 400px;
    margin-top: 10px;
}

.hud-top {
    display: flex;
    justify-content: space-between;
}

.energy-bar {
    height: 15px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
    margin: 5px 0;
}

#energyFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #00ffcc, #00a896);
}

.powerups {
    font-size: 14px;
    color: #e94560;
}

/* Canvas */
canvas {
    background: #16213e;
    border: 5px solid #0f3460;
}

/* Controles */
.controls {
    margin-top: 15px;
    text-align: center;
}

.controls button {
    width: 60px;
    height: 60px;
    margin: 5px;
    font-size: 20px;
    border-radius: 10px;
    border: none;
    background: #0f3460;
    color: white;
}
</style>
</head>

<body>

<div class="hud">
    <div class="hud-top">
        <div>❤️ <span id="lives">3</span></div>
        <div>🏆 <span id="score">0</span></div>
    </div>

    <div class="energy-bar">
        <div id="energyFill"></div>
    </div>

    <div class="powerups">
        Power-up: <span id="powerups">Nenhum</span>
    </div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
    <button id="up">⬆</button><br>
    <button id="left">⬅</button>
    <button id="down">⬇</button>
    <button id="right">➡</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;

let snake = [{x: 200, y: 200}];
let food = {x: 100, y: 100};
let powerUp = {x: 300, y: 300};

let d;

// HUD
let score = 0;
let lives = 3;
let energy = 100;
let maxEnergy = 100;
let activePower = "Nenhum";

const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const energyFill = document.getElementById("energyFill");
const powerupsEl = document.getElementById("powerups");

// CONTROLES TECLADO
document.addEventListener("keydown", e => {
    if(e.keyCode == 37 && d != "RIGHT") d = "LEFT";
    if(e.keyCode == 38 && d != "DOWN") d = "UP";
    if(e.keyCode == 39 && d != "LEFT") d = "RIGHT";
    if(e.keyCode == 40 && d != "UP") d = "DOWN";

    // BOOST
    if(e.key == "Shift" && energy > 10) speed = 50;
});

document.addEventListener("keyup", e => {
    if(e.key == "Shift") speed = 100;
});

// TOUCH BOTÕES
["up","down","left","right"].forEach(id => {
    document.getElementById(id).addEventListener("click", () => {
        if(id=="up" && d!="DOWN") d="UP";
        if(id=="down" && d!="UP") d="DOWN";
        if(id=="left" && d!="RIGHT") d="LEFT";
        if(id=="right" && d!="LEFT") d="RIGHT";
    });
});

// SWIPE
let startX, startY;
canvas.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

canvas.addEventListener("touchmove", e => {
    let dx = e.touches[0].clientX - startX;
    let dy = e.touches[0].clientY - startY;

    if(Math.abs(dx) > Math.abs(dy)) {
        if(dx > 0 && d!="LEFT") d="RIGHT";
        else if(dx < 0 && d!="RIGHT") d="LEFT";
    } else {
        if(dy > 0 && d!="UP") d="DOWN";
        else if(dy < 0 && d!="DOWN") d="UP";
    }
});

function randomPos() {
    return Math.floor(Math.random() * 20) * box;
}

function draw() {

    ctx.fillStyle = "#16213e";
    ctx.fillRect(0,0,400,400);

    // cobra
    snake.forEach((s,i)=>{
        ctx.fillStyle = i==0 ? "#e94560" : "#fff";
        ctx.fillRect(s.x, s.y, box, box);
    });

    // comida
    ctx.fillStyle = "lime";
    ctx.fillRect(food.x, food.y, box, box);

    // powerup
    ctx.fillStyle = "yellow";
    ctx.fillRect(powerUp.x, powerUp.y, box, box);

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(d=="LEFT") headX -= box;
    if(d=="RIGHT") headX += box;
    if(d=="UP") headY -= box;
    if(d=="DOWN") headY += box;

    // comida
    if(headX==food.x && headY==food.y){
        score++;
        scoreEl.innerText = score;
        food = {x: randomPos(), y: randomPos()};
    } else {
        snake.pop();
    }

    // power-up
    if(headX==powerUp.x && headY==powerUp.y){
        activePower = "Energia ⚡";
        powerupsEl.innerText = activePower;
        energy = Math.min(energy+30, maxEnergy);
        powerUp = {x: randomPos(), y: randomPos()};
    }

    let newHead = {x: headX, y: headY};

    // colisão
    if(headX<0||headY<0||headX>=400||headY>=400){
        lives--;
        livesEl.innerText = lives;

        if(lives<=0){
            alert("Game Over! Pontos: "+score);
            location.reload();
        }

        snake = [{x:200,y:200}];
        d = null;
        return;
    }

    snake.unshift(newHead);

    // energia
    energy -= 0.1;
    if(energy<0) energy=0;
    energyFill.style.width = (energy/maxEnergy*100)+"%";
}

let speed = 100;
setInterval(draw, speed);
</script>

</body>
</html>
