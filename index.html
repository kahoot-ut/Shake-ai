<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Battles ULTRA - V2</title>

<style>
    body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #020617;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }

    .hud { 
        width: 400px; 
        padding: 15px;
        background: rgba(30, 41, 59, 0.8);
        border-radius: 0 0 15px 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        margin-bottom: 10px;
    }

    .hud-top { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; }
    
    .energy-container { margin-top: 8px; position: relative; }
    .energy-bar { height: 8px; background: #334155; border-radius: 4px; overflow: hidden; }
    #energyFill { height: 100%; background: #22c55e; transition: width 0.2s; width: 100%; }

    canvas {
        border: 4px solid #334155;
        background: #000;
        box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
        cursor: crosshair;
    }

    .controls { margin-top: 15px; display: grid; grid-template-areas: ". up ." "left down right"; gap: 5px; }
    .btn {
        width: 50px; height: 50px; border: none; border-radius: 8px;
        background: #1e293b; color: white; font-size: 1.5rem;
        cursor: pointer; transition: 0.2s;
    }
    .btn:active { background: #0ea5e9; transform: scale(0.9); }
    #up { grid-area: up; } #left { grid-area: left; } #down { grid-area: down; } #right { grid-area: right; }
</style>
</head>
<body>

<div class="hud">
    <div class="hud-top">
        <div>❤️ <span id="lives">3</span></div>
        <div style="color: #fbbf24;">⚡ <span id="boostText">PRONTO</span></div>
        <div>🏆 <span id="score">0</span></div>
    </div>
    <div class="energy-container">
        <div class="energy-bar"><div id="energyFill"></div></div>
    </div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
    <button class="btn" id="up">▲</button>
    <button class="btn" id="left">◀</button>
    <button class="btn" id="down">▼</button>
    <button class="btn" id="right">▶</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const box = 20;

// Estados do Jogo
let score = 0, lives = 3, energy = 100;
let gameSpeed = 120; // ms por frame
let isBoosting = false;

// PLAYER
let snake = [{x: 200, y: 200}, {x: 200, y: 220}];
let dir = "UP";
let nextDir = "UP";

// BOT
let bot = [{x: 100, y: 100}, {x: 100, y: 80}];
let botDir = "DOWN";

// ITENS
let food = spawnItem();
let powerUp = null; // Item de energia
let particles = [];

// Seletores
const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const energyFill = document.getElementById("energyFill");

function spawnItem() {
    return {
        x: Math.floor(Math.random() * 20) * box,
        y: Math.floor(Math.random() * 20) * box,
        type: Math.random() > 0.8 ? 'energy' : 'food'
    };
}

// CONTROLES (Correção de Bug: impede virar 180º instantaneamente)
document.addEventListener("keydown", e => {
    if(e.key === "ArrowLeft"  && dir !== "RIGHT") nextDir = "LEFT";
    if(e.key === "ArrowUp"    && dir !== "DOWN")  nextDir = "UP";
    if(e.key === "ArrowRight" && dir !== "LEFT")  nextDir = "RIGHT";
    if(e.key === "ArrowDown"  && dir !== "UP")    nextDir = "DOWN";
    if(e.code === "Space") isBoosting = true;
});

document.addEventListener("keyup", e => {
    if(e.code === "Space") isBoosting = false;
});

// Botões mobile
["up","down","left","right"].forEach(id => {
    document.getElementById(id).onmousedown = () => {
        const d = id.toUpperCase();
        const opposite = {UP:"DOWN", DOWN:"UP", LEFT:"RIGHT", RIGHT:"LEFT"};
        if(dir !== opposite[d]) nextDir = d;
    };
});

function moveBot() {
    const head = bot[0];
    const diffX = food.x - head.x;
    const diffY = food.y - head.y;

    // IA mais inteligente: Evita paredes e decide rota
    let desireDir = botDir;
    if (Math.abs(diffX) > Math.abs(diffY)) {
        desireDir = diffX > 0 ? "RIGHT" : "LEFT";
    } else {
        desireDir = diffY > 0 ? "DOWN" : "UP";
    }

    // Prevenção simples de colisão com a própria calda
    botDir = desireDir;
}

function spawnParticles(x, y, color) {
    for(let i=0; i<8; i++) {
        particles.push({
            x: x + box/2, y: y + box/2,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            life: 25,
            color: color
        });
    }
}

function gameLoop() {
    // Lógica de Velocidade (Boost)
    let currentDelay = gameSpeed;
    if (isBoosting && energy > 5) {
        currentDelay = gameSpeed / 2;
        energy -= 1.5;
    } else {
        if (energy < 100) energy += 0.2;
    }
    energyFill.style.width = energy + "%";
    energyFill.style.background = energy < 30 ? "#ef4444" : "#22c55e";

    update();
    setTimeout(gameLoop, currentDelay);
}

function update() {
    dir = nextDir;
    ctx.fillStyle = "#020617";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Movimentação cabeças
    let px = snake[0].x;
    let py = snake[0].y;
    if(dir === "LEFT") px -= box;
    if(dir === "RIGHT") px += box;
    if(dir === "UP") py -= box;
    if(dir === "DOWN") py += box;

    moveBot();
    let bx = bot[0].x;
    let by = bot[0].y;
    if(botDir === "LEFT") bx -= box;
    if(botDir === "RIGHT") bx += box;
    if(botDir === "UP") by -= box;
    if(botDir === "DOWN") by += box;

    // Colisões de Borda (Teletransporte ou Dano)
    if(px < 0 || px >= 400 || py < 0 || py >= 400) {
        lives--;
        livesEl.innerText = lives;
        snake = [{x:200, y:200}];
        if(lives <= 0) { alert("GAME OVER!"); location.reload(); }
        return;
    }

    // Colisão com o BOT (Combate)
    bot.forEach(seg => {
        if(px === seg.x && py === seg.y) {
            lives--;
            livesEl.innerText = lives;
            spawnParticles(px, py, "red");
        }
    });

    // Comer Comida
    if(px === food.x && py === food.y) {
        if(food.type === 'energy') energy = Math.min(100, energy + 30);
        score += 10;
        scoreEl.innerText = score;
        spawnParticles(food.x, food.y, "yellow");
        food = spawnItem();
    } else {
        snake.pop();
    }

    if(bx === food.x && by === food.y) {
        food = spawnItem();
    } else {
        bot.pop();
    }

    snake.unshift({x: px, y: py});
    bot.unshift({x: bx, y: by});

    // Desenhar Comida
    ctx.fillStyle = food.type === 'energy' ? "#0ea5e9" : "#fbbf24";
    ctx.beginPath();
    ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI*2);
    ctx.fill();

    // Desenhar Player com Gradient
    snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? "#22c55e" : "#166534";
        ctx.fillRect(s.x + 1, s.y + 1, box - 2, box - 2);
    });

    // Desenhar Bot
    bot.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? "#ef4444" : "#991b1b";
        ctx.fillRect(s.x + 1, s.y + 1, box - 2, box - 2);
    });

    // Partículas
    particles.forEach((p, i) => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 25;
        ctx.fillRect(p.x, p.y, 3, 3);
        p.x += p.dx; p.y += p.dy; p.life--;
        if(p.life <= 0) particles.splice(i, 1);
    });
    ctx.globalAlpha = 1;
}

gameLoop();
</script>
</body>
</html>
