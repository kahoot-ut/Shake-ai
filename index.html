<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Battles ULTRA</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0f172a;
            color: white;
            font-family: sans-serif;
            touch-action: manipulation;
        }

        h1 {
            margin: 15px 0 5px 0;
            font-size: 24px;
            color: #0ea5e9;
        }

        /* HUD */
        .hud { 
            width: 400px; 
            margin: 10px 0; 
            box-sizing: border-box;
            padding: 0 5px;
        }
        .hud-top { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 8px;
            font-size: 18px;
            font-weight: bold;
        }
        .energy-bar { 
            height: 12px; 
            background: #1e293b; 
            border-radius: 10px; 
            overflow: hidden;
            border: 1px solid #334155;
        }
        #energyFill { 
            height: 100%; 
            width: 100%;
            background: linear-gradient(90deg, #22c55e, #a3e635); 
            transition: width 0.1s linear;
        }

        canvas {
            border: 4px solid #0ea5e9;
            background: #020617;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Controles Mobile */
        .controls {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            justify-content: center;
        }
        .controls button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 12px;
            background: #0ea5e9;
            color: white;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .controls button:active {
            background: #0284c7;
        }
        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

<h1>SNAKE BATTLES ULTRA</h1>

<div class="hud">
    <div class="hud-top">
        <div>❤️ Vidas: <span id="lives">3</span></div>
        <div>🏆 Pontos: <span id="score">0</span></div>
    </div>
    <div class="energy-bar"><div id="energyFill"></div></div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
    <button id="up">⬆</button>
    <button id="left">⬅</button>
    <button id="down">⬇</button>
    <button id="right">➡</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
const canvasSize = 400;

// Estado do Jogo
let snake = [{x: 200, y: 200}];
let dir = null;
let nextDir = null; // Evita bug de duplo clique rápido se auto-colidir

let bot = [{x: 100, y: 100}];
let botDir = "RIGHT";

let food = { x: randomGrid(), y: randomGrid() };
let score = 0;
let lives = 3;
let energy = 100;
let particles = [];

// Controle de FPS (Velocidade do jogo travada)
let lastGridUpdateTime = 0;
const gameSpeed = 130; // Atualiza a cada 130ms (Velocidade ideal)

function randomGrid() {
    return Math.floor(Math.random() * (canvasSize / box)) * box;
}

// Input do Teclado
document.addEventListener("keydown", e => {
    if ((e.key === "ArrowLeft" || e.key === "a") && dir !== "RIGHT") nextDir = "LEFT";
    if ((e.key === "ArrowUp" || e.key === "w") && dir !== "DOWN") nextDir = "UP";
    if ((e.key === "ArrowRight" || e.key === "d") && dir !== "LEFT") nextDir = "RIGHT";
    if ((e.key === "ArrowDown" || e.key === "s") && dir !== "UP") nextDir = "DOWN";
});

// Input dos Botões na Tela
const buttons = {
    up: () => { if (dir !== "DOWN") nextDir = "UP"; },
    down: () => { if (dir !== "UP") nextDir = "DOWN"; },
    left: () => { if (dir !== "RIGHT") nextDir = "LEFT"; },
    right: () => { if (dir !== "LEFT") nextDir = "RIGHT"; }
};

Object.keys(buttons).forEach(id => {
    document.getElementById(id).addEventListener("click", buttons[id]);
    document.getElementById(id).addEventListener("touchstart", (e) => {
        e.preventDefault();
        buttons[id]();
    });
});

// IA Inteligente do Bot
function moveBot() {
    const head = bot[0];
    let possibleMoves = [
        { dir: "LEFT", x: head.x - box, y: head.y },
        { dir: "RIGHT", x: head.x + box, y: head.y },
        { dir: "UP", x: head.x, y: head.y - box },
        { dir: "DOWN", x: head.x, y: head.y + box }
    ];

    // 1. Filtrar movimentos que batem nas paredes
    possibleMoves = possibleMoves.filter(m => m.x >= 0 && m.y >= 0 && m.x < canvasSize && m.y < canvasSize);

    // 2. Filtrar movimentos que batem no próprio corpo do bot
    possibleMoves = possibleMoves.filter(m => !bot.some(b => b.x === m.x && b.y === m.y));

    if (possibleMoves.length === 0) return; // Desiste se não houver saída

    // 3. Escolher o movimento mais perto da comida
    possibleMoves.sort((a, b) => {
        const distA = Math.abs(a.x - food.x) + Math.abs(a.y - food.y);
        const distB = Math.abs(b.x - food.x) + Math.abs(b.y - food.y);
        return distA - distB;
    });

    botDir = possibleMoves[0].dir;
}

// Sistema de Partículas (Efeito ao comer)
function spawnParticles(x, y) {
    for (let i = 0; i < 10; i++) {
        particles.push({
            x: x + box / 2,
            y: y + box / 2,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 1,
            color: "yellow",
            life: 25
        });
    }
}

function resetRound() {
    snake = [{x: 200, y: 200}];
    bot = [{x: 100, y: 100}];
    dir = null;
    nextDir = null;
    botDir = "RIGHT";
    energy = 100;
    document.getElementById("energyFill").style.width = "100%";
}

// Lógica Principal de Movimentação e Regras
function updateGameLogic() {
    if (nextDir) dir = nextDir;

    // Movimento do Jogador (Só anda se uma direção foi escolhida)
    let px = snake[0].x;
    let py = snake[0].y;

    if (dir === "LEFT") px -= box;
    if (dir === "RIGHT") px += box;
    if (dir === "UP") py -= box;
    if (dir === "DOWN") py += box;

    // Movimento do Bot
    moveBot();
    let bx = bot[0].x;
    let by = bot[0].y;

    if (botDir === "LEFT") bx -= box;
    if (botDir === "RIGHT") bx += box;
    if (botDir === "UP") by -= box;
    if (botDir === "DOWN") by += box;

    // Consumo de Energia por andar (Apenas se o player começou a se mover)
    if (dir) {
        energy -= 1.5; 
        if (energy <= 0) {
            energy = 0;
            lives--;
            document.getElementById("lives").innerText = lives;
            resetRound();
            if (lives <= 0) gameOver();
            return;
        }
        document.getElementById("energyFill").style.width = energy + "%";
    }

    // Player comeu fruta?
    if (px === food.x && py === food.y) {
        score += 10;
        document.getElementById("score").innerText = score;
        energy = Math.min(100, energy + 25); // Recupera energia
        spawnParticles(food.x, food.y);
        food = { x: randomGrid(), y: randomGrid() };
    } else if (dir) {
        snake.pop(); // Só remove a cauda se estiver andando
    }

    // Bot comeu fruta?
    if (bx === food.x && by === food.y) {
        spawnParticles(food.x, food.y);
        food = { x: randomGrid(), y: randomGrid() };
    } else {
        bot.pop();
    }

    if (dir) snake.unshift({ x: px, y: py });
    bot.unshift({ x: bx, y: by });

    // Colisão do Jogador (Paredes ou Auto-colisão)
    const hitWall = px < 0 || py < 0 || px >= canvasSize || py >= canvasSize;
    const hitSelf = snake.slice(1).some(segment => segment.x === px && segment.y === py);

    if (dir && (hitWall || hitSelf)) {
        lives--;
        document.getElementById("lives").innerText = lives;
        if (lives <= 0) {
            gameOver();
        } else {
            resetRound();
        }
    }
}

function gameOver() {
    alert(`Game Over! Sua pontuação final: ${score}`);
    score = 0;
    lives = 3;
    document.getElementById("score").innerText = score;
    document.getElementById("lives").innerText = lives;
    resetRound();
}

// Loop de Renderização Física e Visual
function gameLoop(timestamp) {
    // Controla o ritmo das atualizações da cobra (Grid)
    if (!lastGridUpdateTime) lastGridUpdateTime = timestamp;
    const elapsed = timestamp - lastGridUpdateTime;

    if (elapsed >= gameSpeed) {
        updateGameLogic();
        lastGridUpdateTime = timestamp;
    }

    // Renderização Visual (Roda de forma fluida a 60fps+ para partículas)
    ctx.fillStyle = "#020617";
    ctx.fillRect(0, 0, canvasSize, canvasSize);

    // Desenhar Comida
    ctx.fillStyle = "#fbbf24";
    ctx.beginPath();
    ctx.arc(food.x + box/2, food.y + box/2, box/2 - 2, 0, Math.PI * 2);
    ctx.fill();

    // Desenhar Player (Verde)
    snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? "#22c55e" : "#4ade80";
        ctx.fillRect(s.x + 1, s.y + 1, box - 2, box - 2);
    });

    // Desenhar Bot (Vermelho)
    bot.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? "#ef4444" : "#f87171";
        ctx.fillRect(s.x + 1, s.y + 1, box - 2, box - 2);
    });

    // Atualizar e Desenhar Partículas
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
        
        p.x += p.dx;
        p.y += p.dy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    requestAnimationFrame(gameLoop);
}

// Iniciar Jogo
requestAnimationFrame(gameLoop);
</script>

</body>
</html>
